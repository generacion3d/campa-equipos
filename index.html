<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Equipos Campamento CampaZonal</title>
<style>
  :root{
    --bg:#0a0f1e;
    --panel:#111827;
    --panel2:#151b30;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --line:rgba(255,255,255,.08);
    --accent:#818cf8;
    --good:#22c55e;
    --blue:#3b82f6;
    --red:#ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #121a33 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    padding: 30px 20px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-inner {
    display: inline-block;
    background: linear-gradient(135deg, #1a1f35 0%, #0d1226 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 34px 56px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.35);
  }

  .header h1 {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .header p { color: #64748b; font-size: 0.95rem; }

  .summary {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .sum-card {
    background: linear-gradient(135deg, #1e2540, #151b30);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px 24px;
    text-align: center;
    min-width: 120px;
    box-shadow: 0 18px 50px rgba(0,0,0,.25);
  }

  .sum-card .num {
    font-size: 1.9rem;
    font-weight: 900;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sum-card .lbl { font-size: 0.7rem; color: #64748b; text-transform: uppercase; margin-top: 6px; }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
    flex-wrap: wrap;
  }

  .search-input {
    width: 320px;
    padding: 9px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    color: #fff;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 22px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .team-card {
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    transition: transform 0.3s;
  }

  .team-header { padding: 20px; position: relative; }
  .team-header.rojo { background: linear-gradient(135deg, #7f1d1d, #dc2626); }
  .team-header.celeste { background: linear-gradient(135deg, #0e7490, #06b6d4); }
  .team-header.verde { background: linear-gradient(135deg, #14532d, #16a34a); }
  .team-header.gris { background: linear-gradient(135deg, #334155, #64748b); }
  .team-header.morado { background: linear-gradient(135deg, #4c1d95, #7c3aed); }
  .team-header.amarillo { background: linear-gradient(135deg, #ecd02e, #656b12); }
  .team-header.naranja { background: linear-gradient(135deg, #9a3412, #ea580c); }
  .team-header.turquesa { background: linear-gradient(135deg, #155e75, #14b8a6); }

  .team-title { font-size: 1.4rem; font-weight: 900; }
  .team-stats-row { display: flex; gap: 8px; margin-top: 10px; }
  .stat-pill { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 4px 8px; flex: 1; text-align: center; }
  .stat-pill .sv { font-weight: 800; font-size: 0.9rem; }
  .stat-pill .sl { font-size: 0.6rem; opacity: 0.7; text-transform: uppercase; }

  .team-body { padding: 16px; }
  .gender-label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin: 12px 0 6px; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid #1e293b; padding-bottom: 4px; }
  
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 8px; transition: background 0.2s; }
  .player-row:hover { background: rgba(255,255,255,0.05); }
  
  .player-name { font-size: 0.85rem; color: #cbd5e1; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .player-right { display: flex; align-items: center; gap: 8px; }
  
  .talla-badge { background: rgba(255,255,255,0.1); color: #fff; font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
  .vl-badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
  .vl1 { background: #475569; color: #f1f5f9; }
  .vl2 { background: #2563eb; color: #dbeafe; }
  .vl3 { background: #dc2626; color: #fee2e2; }

  .captain-row { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
  .captain-tag { background: #fff; color: #000; font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; font-weight: 900; }
  
  .footer { text-align: center; margin-top: 40px; color: #64748b; font-style: italic; font-size: 0.9rem; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.8rem; }
    .search-input { width: 100%; }
  }
</style>
</head>

  function renderGrid(searchTerm = "") {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    
    teams.forEach(team => {
      const filteredPlayers = team.players.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        p.church.toLowerCase().includes(searchTerm.toLowerCase()) ||
        p.talla.toLowerCase().includes(searchTerm.toLowerCase())
      );
      
      if (filteredPlayers.length === 0 && searchTerm !== "") return;

      const playerRows = filteredPlayers.map(p => `
        <div class="player-row">
          <div class="player-name">${p.name}</div>
          <div class="player-right">
            <span class="talla-badge">${p.talla}</span>
            <span class="vl-badge vl${p.vl}">VL${p.vl}</span>
          </div>
        </div>
      `).join("");

      const total = team.players.length;
      const avgVL = (team.players.reduce((sum, p) => sum + p.vl, 0) / total).toFixed(1);

      grid.innerHTML += `
        <div class="team-card">
          <div class="team-header ${team.color}">
            <div class="team-title">${team.title}</div>
            <div class="team-stats-row">
              <div class="stat-pill"><div class="sv">${total}</div><div class="sl">Jugadores</div></div>
              <div class="stat-pill"><div class="sv">${avgVL}</div><div class="sl">Nivel Prom.</div></div>
            </div>
          </div>
          <div class="team-body">
            <div class="player-row captain-row">
              <div class="player-name"><span class="captain-tag">CAPITÁN</span> ${team.captain}</div>
            </div>
            ${playerRows}
          </div>
        </div>
      `;
    });
  }

  function renderSummary() {
    const all = teams.flatMap(t => t.players);
    const summary = document.getElementById("summary");
    summary.innerHTML = `
      <div class="sum-card"><div class="num">${all.length}</div><div class="lbl">Total</div></div>
      <div class="sum-card"><div class="num">${all.filter(p => p.vl === 3).length}</div><div class="lbl">VL3</div></div>
      <div class="sum-card"><div class="num">${all.filter(p => p.gender === 'H').length}H</div><div class="lbl">Hombres</div></div>
      <div class="sum-card"><div class="num">${all.filter(p => p.gender === 'M').length}M</div><div class="lbl">Mujeres</div></div>
    `;
  }

  document.getElementById("searchInput").addEventListener("input", (e) => renderGrid(e.target.value));

  renderSummary();
  renderGrid();
</script>
</body>
</html>
